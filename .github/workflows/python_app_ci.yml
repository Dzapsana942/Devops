name: Python app CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask

      - name: Check that app.py compiles
        run: python -m py_compile app.py

      - name: Run simple smoke test
        run: |
          python app.py &
          sleep 3
          curl http://localhost:5000 || (echo "App not responding" && exit 1)
